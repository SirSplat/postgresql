name: Build and Push dbo Docker Image

on:
  push:
    branches: [main]
    paths:
      - 'dbo/Dockerfile'
      - 'dbo/initdb.sh'
      - '.github/workflows/dbo-docker-image.yaml'
  pull_request:
    branches: [main]
    paths:
      - 'dbo/Dockerfile'
      - 'dbo/initdb.sh'
      - '.github/workflows/dbo-docker-image.yaml'
  workflow_dispatch:
  schedule:
    - cron: '0 0 * * 0'

jobs:
  build-and-push:
    uses: SirSplat/workflows/.github/workflows/build-and-push-docker-image.yaml@fix-cache-to-on-pr-builds
    with:
      directory: ./dbo
      image_name: postgresql
      tag_prefix: dbo
      pg_major_matrix: '["13","14","15","16","17","18"]'
      default_pg_major: '18'
      build_args: |
        PG_VARIANT=alpine
      image_description: 'PostgreSQL on Alpine with the dbo application role pre-created as a non-superuser'
      push_on_pull_request: false
      status_gist_id: ${{ vars.STATUS_GIST_ID }}
    secrets:
      DOCKER_USERNAME: ${{ secrets.DOCKER_USERNAME }}
      DOCKER_PASSWORD: ${{ secrets.DOCKER_PASSWORD }}
      GIST_TOKEN: ${{ secrets.GIST_TOKEN }}
